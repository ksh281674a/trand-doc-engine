name: Start Engine
on:
  schedule:
    - cron: '0 20 * * *'  # UTC 20:00 = KST 05:00
  workflow_dispatch:
jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install ctype CLI
        run: npm install -g @cloudtype/cli
      - name: Login
        run: ctype login --token ${{ secrets.CLOUDTYPE_TOKEN }}
      - name: Deploy
        run: ctype apply -f trand-doc-engine.yaml
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
