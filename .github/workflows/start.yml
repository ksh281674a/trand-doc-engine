name: Start Engine
on:
  schedule:
    - cron: '50 23 * * *'  # UTC 23:50 = KST 08:50
  workflow_dispatch:

jobs:
  start:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install ctype CLI
        run: npm install -g @cloudtype/cli
      - name: Login
        run: ctype login --token ${{ secrets.CLOUDTYPE_TOKEN }}
      - name: Deploy
        run: ctype apply -f trand-doc-engine.yaml
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
